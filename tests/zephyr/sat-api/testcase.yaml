common:
  platform_allow:
    - native_sim
    - qemu_cortex_m3
  tags:
    - satellite
    - apis

tests:
  satellite.api:
    extra_configs:
      - CONFIG_HUBBLE_SAT_NETWORK_PROTOCOL_V1=y
  satellite.api.counter.mbedtls:
    extra_configs:
      - CONFIG_HUBBLE_SAT_NETWORK_PROTOCOL_V1=y
      - CONFIG_HUBBLE_NETWORK_CRYPTO_MBEDTLS=y
      - CONFIG_HUBBLE_COUNTER_SOURCE_DEVICE_UPTIME=y
      - CONFIG_HUBBLE_EID_ROTATION_PERIOD_SEC=86400
  satellite.api.counter.psa:
    extra_configs:
      - CONFIG_HUBBLE_SAT_NETWORK_PROTOCOL_V1=y
      - CONFIG_HUBBLE_NETWORK_CRYPTO_PSA=y
      - CONFIG_HUBBLE_COUNTER_SOURCE_DEVICE_UPTIME=y
      - CONFIG_HUBBLE_EID_ROTATION_PERIOD_SEC=86400
