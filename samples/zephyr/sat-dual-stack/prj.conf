# Hubble Network
CONFIG_HUBBLE_BLE_NETWORK=y
CONFIG_HUBBLE_SAT_NETWORK=y

# Bluetooth dependencies
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Hubble-Zephyr"

# Allow large GATT writes, the orbital params command is 78 bytes
CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# Used to decode the device key
CONFIG_BASE64=y

# The next satellite pass may be more than 18 hours away
CONFIG_TIMEOUT_64BIT=y

CONFIG_LOG=y
CONFIG_MAIN_STACK_SIZE=2048
